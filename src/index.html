<!doctype html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>SinalMundo | Global Network Command</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "var(--bg)", "on-surface": "var(--on-surface)",
            "primary": "var(--primary)", "primary-container": "var(--primary-container)",
            "secondary": "var(--secondary)", "tertiary": "var(--tertiary)",
            "error": "var(--error)", "error-container": "var(--error-container)",
            "surface": "var(--surface)", "surface-dim": "var(--surface-dim)",
            "surface-container": "var(--surface-container)", "surface-container-high": "var(--surface-container-high)",
            "surface-container-highest": "var(--surface-container-highest)", "surface-container-lowest": "var(--surface-container-lowest)",
            "outline": "var(--outline)"
          },
          fontFamily: {
            "headline": ["Syne"], "body": ["Manrope"],
            "mono": ["Share Tech Mono"]
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #f8fafc;
      --on-surface: #0f172a;
      
      --surface: #ffffff;
      --surface-dim: #f1f5f9;
      --surface-container: #e2e8f0;
      --surface-container-high: #cbd5e1;
      --surface-container-highest: #94a3b8;
      --surface-container-lowest: #ffffff;
      
      --outline: #64748b;
      
      --primary: #059669;
      --primary-container: #10b981;
      --secondary: #0284c7;
      --tertiary: #e11d48;
      --error: #dc2626;
      --error-container: #fecaca;

      --map-outage: #fecaca;
      --map-slow: #fef08a;
      --map-censored: #bfdbfe;
      --map-normal: #d1fae5;
      --map-fill: #f1f5f9;
      --map-stroke: rgba(0,0,0,0.1);
      
      --nav-bg: rgba(255, 255, 255, 0.85);
      --map-bg: #f1f5f9;
    }

    .dark {
      --bg: #030608;
      --on-surface: #f6fafd;
      
      --surface: #0a0f11;
      --surface-dim: #0a0f11;
      --surface-container: #151a1e;
      --surface-container-high: #1a2024;
      --surface-container-highest: #20272b;
      --surface-container-lowest: #000000;
      
      --outline: #717679;
      
      --primary: #2ff3ad;
      --primary-container: #00e5a0;
      --secondary: #3edff7;
      --tertiary: #ff6f7a;
      --error: #ff716c;
      --error-container: #9f0519;

      --map-outage: #2a0a0f;
      --map-slow: #1f1505;
      --map-censored: #0d0d1f;
      --map-normal: #061a12;
      --map-fill: #101820;
      --map-stroke: rgba(255,255,255,0.05);

      --nav-bg: rgba(10, 15, 17, 0.85);
      --map-bg: #040c10;
    }

    body { background-color: var(--bg); position: relative; overflow: hidden; }
    .scanline-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 100; opacity: 0.15;
    }
    .dark .scanline-overlay { opacity: 0.15; }
    :root:not(.dark) .scanline-overlay { opacity: 0.05; }
    
    .noise-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDQTnZ2RAXkMmly9ues0hYj-n2sMK4uQxSL7HTROp8wmyKPuLSFrX6d6ODEoDMKNtKRId5Oz-_0RvePS8mgaY9VZ7HKVjZanygPUBKdr6C2go-9_IIrnNpIjPfxzsTxzoyJq_r1Vn6ljlE9dihlHiMjW-2EUELfb_7kZrAb3sXakEDtEicZ29pGMaYS95uAGXwz04wTGgWc-e-W-ngXRkXDlAkIinZGLpbXxG5qZQ2824hz64k8FB24uvgi9RWI3TMJHayXgs17V6GQ);
      opacity: 0.035; pointer-events: none; z-index: 101;
    }
    
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    .pulse-red { animation: pulse-red 2s infinite ease-in-out; }
    @keyframes pulse-red { 0% { transform: scale(0.8); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 0.4; } 100% { transform: scale(0.8); opacity: 0.8; } }
    
    .glass-header { 
      background-color: var(--nav-bg);
      backdrop-filter: blur(12px); 
    }
    
    .map-bg-class {
      background-color: var(--map-bg) !important;
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: var(--bg); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--surface-container-highest); border-radius: 4px; }
  </style>
</head>
<body class="text-on-surface font-body selection:bg-primary/30 h-screen flex flex-col">
  <div class="scanline-overlay"></div>
  <div class="noise-overlay"></div>
  <app-root class="flex-1 flex flex-col h-full overflow-hidden"></app-root>
</body>
</html>
